<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASINO Octopus POS</title>

<style>
body{
background:#0d0d0d;
color:white;
font-family:sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#ff3333;
font-size:50px;
text-shadow:0 0 20px red;
}

.section{
background:#1a1a1a;
border:2px solid #ff3333;
border-radius:20px;
padding:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

h2{
color:#ff6666;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:15px 0;
}

input[type=number]{
width:80px;
height:40px;
font-size:20px;
text-align:center;
background:black;
color:white;
border:1px solid red;
border-radius:10px;
}

#staff{
width:100%;
height:40px;
font-size:18px;
background:black;
color:white;
border:1px solid red;
border-radius:10px;
}

.total{
font-size:35px;
text-align:center;
color:gold;
margin-top:30px;
}

button{
width:100%;
padding:20px;
font-size:25px;
background:#ff2222;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
margin-top:30px;
}
</style>
</head>
<body>

<div class="container">

<h1>CASINO Octopus</h1>

<div class="section">
<h2>販売した従業員名</h2>
<input type="text" id="staff">
</div>

<div class="section">
<h2>FOOD</h2>

<div class="item">
<span>九頭竜焼き ¥20,000</span>
<input type="number" id="food1" value="0" min="0" oninput="calc()">
</div>

<div class="item">
<span>布袋風お好み焼き ¥30,000</span>
<input type="number" id="food2" value="0" min="0" oninput="calc()">
</div>

<h2>DRINK</h2>

<div class="item">
<span>ノンデスブルー ¥20,000</span>
<input type="number" id="drink1" value="0" min="0" oninput="calc()">
</div>

<div class="item">
<span>アザトスーパービール ¥30,000</span>
<input type="number" id="drink2" value="0" min="0" oninput="calc()">
</div>

<h2>RELAX</h2>

<div class="item">
<span>オリジナルシガレット 一本 ¥20,000</span>
<input type="number" id="relax1" value="0" min="0" oninput="calc()">
</div>

<div class="item">
<span>オリジナルシガレット 一箱 ¥200,000</span>
<input type="number" id="relax2" value="0" min="0" oninput="calc()">
</div>

</div>

<div class="total" id="total">
合計 ¥0
</div>

<button onclick="finishSale()">
会計完了
</button>

</div>

<script>

const webhookURL = "https://discord.com/api/webhooks/1517208107225321564/hTXyC0h-81vH1PwucGb2OWRDJRS3Ss_1RvvfANxYpfc8KUTqXfJ5p9TGuaeN9bgXU9Wu";

function calc(){

let total =
Number(document.getElementById("food1").value)*20000 +
Number(document.getElementById("food2").value)*30000 +
Number(document.getElementById("drink1").value)*20000 +
Number(document.getElementById("drink2").value)*30000 +
Number(document.getElementById("relax1").value)*20000 +
Number(document.getElementById("relax2").value)*200000;

document.getElementById("total").innerHTML =
"合計 ¥" + total.toLocaleString();

}

async function finishSale(){

let total =
Number(document.getElementById("food1").value)*20000 +
Number(document.getElementById("food2").value)*30000 +
Number(document.getElementById("drink1").value)*20000 +
Number(document.getElementById("drink2").value)*30000 +
Number(document.getElementById("relax1").value)*20000 +
Number(document.getElementById("relax2").value)*200000;

let payload = {
embeds:[{
title:"CASINO Octopus 売上記録",
color:16711680,
fields:[
{name:"従業員",value:document.getElementById("staff").value || "未入力"},
{name:"九頭竜焼き",value:document.getElementById("food1").value},
{name:"布袋風お好み焼き",value:document.getElementById("food2").value},
{name:"ノンデスブルー",value:document.getElementById("drink1").value},
{name:"アザトスーパービール",value:document.getElementById("drink2").value},
{name:"シガレット 一本",value:document.getElementById("relax1").value},
{name:"シガレット 一箱",value:document.getElementById("relax2").value},
{name:"合計金額",value:"¥"+total.toLocaleString()},
{name:"日時",value:new Date().toLocaleString("ja-JP")}
]
}]
};

try{
await fetch(webhookURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
});
}catch(e){
console.log(e);
}

document.getElementById("staff").value="";

document.getElementById("food1").value=0;
document.getElementById("food2").value=0;
document.getElementById("drink1").value=0;
document.getElementById("drink2").value=0;
document.getElementById("relax1").value=0;
document.getElementById("relax2").value=0;

calc();

alert("会計を送信しました");

}

calc();

</script>

</body>
</html>
